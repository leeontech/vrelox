<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>VRELOX - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container auth-container">
        <h2>CREATE ACCOUNT</h2>
        <form action="/register" method="POST">
            <div class="form-group"><label>Full Name</label><input type="text" name="name" required></div>
            <div class="form-group"><label>Email Address</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
            <div class="form-group">
                <label>Account Type</label>
                <select name="role"><option value="customer">Customer / Reader</option><option value="admin">Admin / Editor</option></select>
            </div>
            <button type="submit" class="auth-btn">Register</button>
        </form>
        <p style="margin-top:20px; font-size:12px; color:var(--text-muted)">Already have an account? <a href="/login" style="color:var(--gold-primary)">Login</a></p>
    </div>
</body>
</html>
