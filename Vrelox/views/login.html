<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>VRELOX - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container auth-container">
        <h2>VRELOX LOGIN</h2>
        <form action="/login" method="POST">
            <div class="form-group"><label>Email Address</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>
        <p style="margin-top:20px; font-size:12px; color:var(--text-muted)">New to Vrelox? <a href="/register" style="color:var(--gold-primary)">Register</a></p>
    </div>
</body>
</html>
